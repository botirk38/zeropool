name: Publish

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Perform a dry run (do not publish)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io version
        id: crate
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if curl -fsSL -A "zeropool-release-workflow" "https://crates.io/api/v1/crates/zeropool/$version" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "zeropool $version already exists on crates.io; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package can be published
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || steps.crate.outputs.published != 'true' }}
        run: cargo publish --dry-run

      - name: Publish to crates.io
        if: ${{ (github.event_name != 'workflow_dispatch' || !inputs.dry-run) && steps.crate.outputs.published != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish
